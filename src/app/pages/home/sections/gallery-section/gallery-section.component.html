<section class="gallery" id="gallery">
  <div class="section-heading gallery-heading">
    <div>
      <p class="eyebrow">Photography</p>
      <h2>Real places, real light, ready for the next campaign.</h2>
    </div>
    <p>
      A working image library for hotel pages, booking channels, paid ads and
      seasonal social content.
    </p>
  </div>

  <div class="photo-grid" id="work">
    <figure class="photo-tall photo-arrival">
      <img
        src="/assets/blue-lagoon/arrival-walkway.jpg"
        alt="A guest walking through a framed resort walkway"
        loading="lazy"
      />
      <figcaption>Arrival paths</figcaption>
      <app-original-media-mark />
    </figure>
    <figure class="photo-hotel">
      <img
        src="/assets/blue-lagoon/hotel-facade.jpg"
        alt="Hotel balconies framed by palms and sun umbrellas"
        loading="lazy"
      />
      <figcaption>Hotel exterior</figcaption>
      <app-original-media-mark />
    </figure>
    <figure class="photo-lounge">
      <img
        src="/assets/blue-lagoon/lounge-vertical.jpg"
        alt="A bright arched hotel lounge with chandeliers and sofas"
        loading="lazy"
      />
      <figcaption>Interior atmosphere</figcaption>
      <app-original-media-mark />
    </figure>
    <figure class="photo-wide photo-courtyard">
      <img
        src="/assets/blue-lagoon/courtyard-fountain.jpg"
        alt="A white Mediterranean courtyard with a fountain and patterned stone floor"
        loading="lazy"
      />
      <figcaption>Courtyards and details</figcaption>
      <app-original-media-mark />
    </figure>
    <figure class="photo-wide photo-rooftops">
      <img
        src="/assets/blue-lagoon/white-town-rooftops.jpg"
        alt="White Mediterranean rooftops with flowers and stone walls"
        loading="lazy"
      />
      <figcaption>Destination texture</figcaption>
      <app-original-media-mark />
    </figure>
    <figure class="photo-wide photo-bar">
      <img
        src="/assets/blue-lagoon/bar-detail.jpg"
        alt="A bright hotel bar with arched walls and a wooden counter"
        loading="lazy"
      />
      <figcaption>Food and drink spaces</figcaption>
      <app-original-media-mark />
    </figure>
    <figure class="photo-wide photo-pool">
      <img
        src="/assets/blue-lagoon/pool-arches-night.jpg"
        alt="Arched hotel windows reflected in a pool at night"
        loading="lazy"
      />
      <figcaption>Pool reflections</figcaption>
      <app-original-media-mark />
    </figure>
    <figure class="photo-tall photo-garden">
      <img
        src="/assets/blue-lagoon/garden-stairs.jpg"
        alt="A shaded garden stairway with stone steps and potted plants"
        loading="lazy"
      />
      <figcaption>Quiet corners</figcaption>
      <app-original-media-mark />
    </figure>
  </div>

  <details #photoGallery class="more-photos">
    <summary>View more photography</summary>
    <div class="photo-strip" aria-label="Additional Blue Lagoon photography">
      <figure>
        <img
          src="/assets/blue-lagoon/round-window-palms.jpg"
          alt="A round white window framing palms and purple flowers"
          loading="lazy"
        />
        <figcaption>Architectural details</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/interior-arches.jpg"
          alt="A bright arched interior lounge with silver vases"
          loading="lazy"
        />
        <figcaption>Interior rhythm</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/arched-lounge.jpg"
          alt="A refined hotel lounge framed by soft arches"
          loading="lazy"
        />
        <figcaption>Lounge details</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/hotel-evening.jpg"
          alt="A resort exterior illuminated in the evening"
          loading="lazy"
        />
        <figcaption>Evening atmosphere</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/coastal-fishing-boat.jpg"
          alt="A small fishing boat arriving beside a pebble beach with mountains behind it"
          loading="lazy"
        />
        <figcaption>Local coast</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/pool-walkway-evening.jpg"
          alt="A resort pool walkway leading toward the sea at dusk"
          loading="lazy"
        />
        <figcaption>Poolside arrival</figcaption>
        <app-original-media-mark />
      </figure>
      <figure class="photo-strip-beach">
        <img
          src="/assets/blue-lagoon/family-snorkeling-beach.jpg"
          alt="A family preparing to snorkel on a pebble beach beside calm water"
          loading="lazy"
        />
        <figcaption>Beach moments</figcaption>
        <app-original-media-mark />
      </figure>
      <figure class="photo-strip-tall">
        <img
          src="/assets/blue-lagoon/lounge-ceiling-vertical.jpg"
          alt="A hotel lounge with hanging ceiling details, dining tables and silver vases"
          loading="lazy"
        />
        <figcaption>Lounge perspective</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/arched-walkway-benches.jpg"
          alt="A white arched resort walkway with benches in warm afternoon light"
          loading="lazy"
        />
        <figcaption>Resort walkway</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/courtyard-fountain-arch.jpg"
          alt="A white resort arch framing a courtyard fountain and palm trees"
          loading="lazy"
        />
        <figcaption>Courtyard details</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/beach-boardwalk-paddle.jpg"
          alt="A wooden walkway leading to a calm sea with guests paddleboarding offshore"
          loading="lazy"
        />
        <figcaption>At the water's edge</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/sunset-sail-shades.jpg"
          alt="Poolside sun shades and sail details facing the sea at sunset"
          loading="lazy"
        />
        <figcaption>Sunset poolside</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/sculptural-wood-screen.jpg"
          alt="A sculptural wooden screen dividing a bright hotel lounge"
          loading="lazy"
        />
        <figcaption>Material details</figcaption>
        <app-original-media-mark />
      </figure>
      <figure class="photo-strip-tall">
        <img
          src="/assets/blue-lagoon/poolside-night-drink.jpg"
          alt="A candlelit drink beside an illuminated resort pool at night"
          loading="lazy"
        />
        <figcaption>Night atmosphere</figcaption>
        <app-original-media-mark />
      </figure>
      <figure class="photo-strip-tall">
        <img
          src="/assets/blue-lagoon/bougainvillea-stairs.jpg"
          alt="A stone stairway lined with pottery and bright bougainvillea"
          loading="lazy"
        />
        <figcaption>Local textures</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/stone-arch-bar.jpg"
          alt="A warm stone bar interior with arches and hanging lights"
          loading="lazy"
        />
        <figcaption>Hospitality spaces</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          src="/assets/blue-lagoon/historic-columns.jpg"
          alt="Historic stone columns and broad steps under a clear sky"
          loading="lazy"
        />
        <figcaption>Destination stories</figcaption>
        <app-original-media-mark />
      </figure>
      <figure>
        <img
          class="photo-crop-evening-hotel"
          src="/assets/blue-lagoon/hotel-balconies-evening.jpg"
          alt="An illuminated hotel facade with curved balconies at dusk"
          loading="lazy"
        />
        <figcaption>Evening facade</figcaption>
        <app-original-media-mark />
      </figure>
      <div class="photo-strip-destination">
        <figure class="destination-city">
          <img
            class="photo-crop-clocktower"
            src="/assets/blue-lagoon/london-clocktower-autumn.jpg"
            alt="A London clocktower framed by autumn trees under a dramatic sky"
            loading="lazy"
          />
          <figcaption>City perspective</figcaption>
          <app-original-media-mark />
        </figure>
        <figure class="destination-season">
          <img
            class="photo-crop-autumn-leaves"
            src="/assets/blue-lagoon/london-clocktower-leaves.jpg"
            alt="A London clocktower seen through richly colored autumn leaves"
            loading="lazy"
          />
          <figcaption>Seasonal details</figcaption>
          <app-original-media-mark />
        </figure>
        <figure class="destination-street">
          <img
            class="photo-crop-waterloo"
            src="/assets/blue-lagoon/waterloo-station-street.jpg"
            alt="The Waterloo Station facade and surrounding London street scene"
            loading="lazy"
          />
          <figcaption>Street-level stories</figcaption>
          <app-original-media-mark />
        </figure>
        <figure class="photo-strip-tall destination-kings">
          <img
            class="photo-crop-kings-college"
            src="/assets/blue-lagoon/kings-college-london-vertical.jpg"
            alt="The King's College London facade in warm afternoon light"
            loading="lazy"
          />
          <figcaption>Urban architecture</figcaption>
          <app-original-media-mark />
        </figure>
        <figure class="photo-strip-tall destination-tower">
          <img
            class="photo-crop-glass-tower"
            src="/assets/blue-lagoon/london-glass-tower-vertical.jpg"
            alt="A modern London glass tower rising above autumn trees"
            loading="lazy"
          />
          <figcaption>Modern landmarks</figcaption>
          <app-original-media-mark />
        </figure>
        <figure class="destination-hall">
          <img
            class="photo-crop-albert-hall"
            src="/assets/blue-lagoon/royal-albert-hall.jpg"
            alt="The Royal Albert Hall framed by stone steps and monuments"
            loading="lazy"
          />
          <figcaption>Landmark details</figcaption>
          <app-original-media-mark />
        </figure>
        <figure class="destination-park">
          <img
            class="photo-crop-park-skater"
            src="/assets/blue-lagoon/autumn-park-skater.jpg"
            alt="A roller skater following a tree-lined park path in autumn"
            loading="lazy"
          />
          <figcaption>Human moments</figcaption>
          <app-original-media-mark />
        </figure>
      </div>
    </div>
    <div class="photo-gallery-close">
      <button class="button button-secondary" type="button" (click)="closeGallery()">
        Close gallery
      </button>
    </div>
  </details>
</section>
