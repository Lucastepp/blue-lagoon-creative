<section class="contact" id="contact">
  <div class="contact-copy">
    <p class="eyebrow">Start a project</p>
    <h2>Show us your place.</h2>
    <p>
      Planning a visual refresh, a new website or a campaign for a destination
      property? Tell us what you are working with.
    </p>
  </div>

  <form class="project-form">
    <label>
      Your name
      <input type="text" name="name" autocomplete="name" placeholder="Name" />
    </label>
    <label>
      Email
      <input type="email" name="email" autocomplete="email" placeholder="Email address" />
    </label>
    <label class="full-row">
      Type of place
      <select name="property-type">
        <option value="">Choose a property type</option>
        <option>Hotel or resort</option>
        <option>Holiday rental or villa</option>
        <option>Venue or retreat</option>
        <option>Destination property</option>
      </select>
    </label>
    <label class="full-row">
      What should look better online?
      <textarea name="message" rows="4" placeholder="Photos, video, drone, a website, marketing or the full refresh..."></textarea>
    </label>
    <button class="button button-primary full-row" type="button">Send project details</button>
    <p class="form-note full-row">Concept form only. Connect a secured delivery path before launch.</p>
  </form>
</section>
