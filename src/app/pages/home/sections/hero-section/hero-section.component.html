<section class="hero" aria-label="Introduction">
  <video
    class="hero-background"
    data-autoplay-video
    autoplay
    loop
    muted
    playsinline
    preload="metadata"
    poster="/assets/blue-lagoon/drone-water-rise-poster.jpg"
    aria-hidden="true"
  >
    <source src="/assets/blue-lagoon/drone-water-rise.mp4" type="video/mp4" />
  </video>

  <div class="hero-copy">
    <p class="eyebrow">Hospitality &middot; worldwide</p>
    <h1>Stays the world books <app-word-rotator [words]="heroWords" />.</h1>
    <p class="hero-lead">
      Brand, film, and a booking path that sell the stay &mdash; and keep the guests, and the
      margin, the booking sites would have taken.
    </p>
    <div class="hero-actions">
      <a class="button button-primary" href="#contact">Show us your place</a>
      <a class="button button-secondary" href="#films">See the films</a>
    </div>
  </div>

  <p class="demo-note">Original Blue Lagoon Creative footage</p>
</section>
